[pytest]
DJANGO_SETTINGS_MODULE = portfolio_management.test_settings
python_files = tests.py test_*.py *_tests.py
testpaths = tests
addopts =
    --strict-markers
    --strict-config
    --verbose
    --reuse-db
    --cov
    --cov-config=setup.cfg
    # --cov-fail-under=80  # Disabled for single test execution
    --cov-append
    --cov-report=term-missing
    --benchmark-disable
    --asyncio-mode=auto
markers =
    slow: marks tests as slow (deselect with '-m "not slow"')
    integration: marks tests as integration tests
    unit: marks tests as unit tests
    performance: marks tests as performance tests
    edge_case: marks tests as edge case tests
    regression: marks tests as regression tests
    regression_critical: marks tests as regression critical tests
    advanced: marks tests as advanced scenario tests
    production: marks tests as production snapshot tests
    production_critical: marks tests as production critical tests
    api: marks tests as API tests
    workflow: marks tests as workflow tests
    database: marks tests as database constraint tests
    nav: marks tests as NAV calculation tests
    buy_in_price: marks tests as buy-in price calculation tests
    fx: marks tests as FX calculation tests
    gain_loss: marks tests as gain/loss calculation tests
    ytm: marks tests as YTM calculation tests
    bond_aci: marks tests as bond ACI calculation tests

# Note: Use -m markers to exclude integration and performance tests

filterwarnings =
    ignore:.*PyType_Spec.*custom tp_new.*:DeprecationWarning:google\._upb\._message

# Note: Database settings are configured via Django settings module
