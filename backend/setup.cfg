[flake8]
max-line-length = 88
extend-ignore = E203, W503, E501, I
exclude =
    .git,
    __pycache__,
    migrations,
    venv,
    env,
    build,
    dist,
    .venv,
    .eggs,
    *.egg-info,
    .pytest_cache,
    htmlcov,
    backend/venv,
    */migrations/*
per-file-ignores =
    __init__.py:F401,F403
    settings/*:F403,F405
    tests/*:F401,F811
max-complexity = 75
# Remove problematic import-order-style that conflicts with isort
# import-order-style = django
application-import-names = portfolio_management

[isort]
profile = django
line_length = 88
multi_line_output = 3
include_trailing_comma = True
force_grid_wrap = 0
use_parentheses = True
ensure_newline_before_comments = True
skip = migrations
skip_glob = */migrations/*,*/venv/*

[mypy]
python_version = 3.10
disallow_untyped_defs = False
disallow_incomplete_defs = False
check_untyped_defs = True
disallow_untyped_decorators = False
no_implicit_optional = True
strict_optional = True
warn_redundant_casts = True
warn_return_any = False
warn_unused_ignores = False
warn_no_return = True
warn_unreachable = True
allow_redefinition = False
ignore_missing_imports = True

[coverage:run]
source = .
omit =
    # Python cache and compiled files
    */__pycache__/*
    */.pytest_cache/*
    *.py[cod]
    $py.class

    # Virtual environments
    venv/*
    env/*
    .venv/*
    */venv/*

    # Migrations (they're rarely tested and don't represent business logic)
    */migrations/*
    migrations/*

    # Test files themselves (don't measure test coverage)
    tests/*
    */tests/*

    # Django-specific files that don't need coverage
    manage.py
    */settings/*
    wsgi.py
    asgi.py

    # IDE and editor files
    .vscode/*
    .idea/*

    # Build and distribution
    build/*
    dist/*
    *.egg-info/*

    # Documentation and notebooks
    docs/*
    *.ipynb

    # Temporary and cache files
    temp_files/*
    logs/*
    *.log
    .coverage

    # Common Django app boilerplate (these files are usually minimal)
    */__init__.py
    */apps.py
    */admin.py

    # Third party and vendor code
    */vendor/*
    */third_party/*

# Performance optimization: disable branch coverage for faster execution
[coverage:report]
precision = 2
show_missing = true
skip_covered = false
exclude_lines =
    # Have to re-enable the standard pragma
    pragma: no cover

    # Defensive programming: code that will never be executed
    def __repr__
    if self.debug

    # Abstract classes and methods
    raise NotImplementedError
    @abstractmethod

    # Type checking and imports that are only run in certain environments
    if TYPE_CHECKING:

    # Exception handling that's hard to test
    except ImportError:
    except Exception:
    raise

    # Development and debugging code
    if settings.DEBUG:
    assert.*

    # Logging statements (usually not worth testing)
    logger\.
    logging\.

# Faster configuration for development
[coverage:html]
directory = htmlcov
show_contexts = false
skip_empty = true

# Fail if coverage drops below threshold
[coverage:fail_report]
min_overall_cover = 80.0
