[pytest]
DJANGO_SETTINGS_MODULE = portfolio_management.settings
python_files = tests.py test_*.py *_tests.py
testpaths = tests
addopts =
    --strict-markers
    --strict-config
    --verbose
    --reuse-db
markers =
    slow: marks tests as slow (deselect with '-m "not slow"')
    integration: marks tests as integration tests
    unit: marks tests as unit tests
    performance: marks tests as performance tests
    edge_case: marks tests as edge case tests
    regression: marks tests as regression tests
    advanced: marks tests as advanced scenario tests
    nav: marks tests as NAV calculation tests
    buy_in_price: marks tests as buy-in price calculation tests
    fx: marks tests as FX calculation tests
    gain_loss: marks tests as gain/loss calculation tests
    ytm: marks tests as YTM calculation tests
    bond_aci: marks tests as bond ACI calculation tests
