name: Backend CI/CD Pipeline

on:
  push:
    branches: [main, develop]
    paths:
      - 'backend/**'
  pull_request:
    branches: [main, develop]
    paths:
      - 'backend/**'
  schedule:
    # Run tests daily at 3 AM UTC (staggered from main CI)
    - cron: "0 3 * * *"

jobs:
  test-backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend

    strategy:
      matrix:
        python-version: [3.9, 3.10, 3.11]

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: portfolio_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip dependencies
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-backend-${{ hashFiles('backend/**/requirements*.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-backend-
            ${{ runner.os }}-pip-

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt
          pip install coverage pytest-cov pytest-xdist pytest-mock pytest-benchmark

      - name: Cache pytest cache
        uses: actions/cache@v3
        with:
          path: backend/.pytest_cache
          key: ${{ runner.os }}-pytest-backend-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-pytest-backend-

      - name: Set up environment variables
        run: |
          cat << EOF > .env.test
          DEBUG=True
          SECRET_KEY=test-secret-key-for-ci
          DATABASE_URL=postgresql://postgres:postgres@localhost:5432/portfolio_test
          ALLOWED_HOSTS=localhost,127.0.0.1
          LOG_LEVEL=INFO
          EOF

      - name: Run database migrations
        run: |
          python manage.py makemigrations
          python manage.py migrate
        env:
          DJANGO_SETTINGS_MODULE: portfolio_management.settings

      - name: Run linting
        run: |
          # Black formatting check
          black --check --diff portfolio_management tests
          # isort import sorting check
          isort --check-only --diff portfolio_management tests
          # flake8 linting
          flake8 portfolio_management tests --max-line-length=88 --extend-ignore=E203,W503,E501,I
          # mypy type checking
          mypy portfolio_management --ignore-missing-imports

      - name: Run security checks
        run: |
          # bandit security linter
          bandit -r portfolio_management -f json -o bandit-report.json
          # safety check for known security vulnerabilities
          safety check --json --output safety-report.json

      - name: Run unit tests (fast path)
        if: github.event_name == 'pull_request'
        run: |
          python -m pytest -c pytest_fast.ini -m "unit" -v --tb=short --junitxml=junit-unit.xml
        env:
          DJANGO_SETTINGS_MODULE: portfolio_management.settings

      - name: Run all tests with coverage
        if: github.event_name == 'push' || github.event_name == 'schedule'
        run: |
          python -m pytest -c pytest_dev.ini -v \
            --cov=portfolio_management \
            --cov-report=xml \
            --cov-report=html \
            --cov-report=term-missing \
            --cov-fail-under=80 \
            --junitxml=junit.xml \
            -n auto \
            tests/
        env:
          DJANGO_SETTINGS_MODULE: portfolio_management.settings

      - name: Run performance benchmarks
        if: github.event_name == 'push' || github.event_name == 'schedule'
        run: |
          python -m pytest -m performance \
            --benchmark-only \
            --benchmark-json=benchmark-results.json \
            tests/advanced/test_performance_suite.py
        env:
          DJANGO_SETTINGS_MODULE: portfolio_management.settings

      - name: Upload coverage to Codecov
        if: github.event_name == 'push' || github.event_name == 'schedule'
        uses: codecov/codecov-action@v3
        with:
          file: ./backend/coverage.xml
          flags: backend-tests
          name: codecov-backend
          fail_ci_if_error: false

      - name: Upload test artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-test-reports-${{ matrix.python-version }}
          path: |
            backend/htmlcov/
            backend/bandit-report.json
            backend/safety-report.json
            backend/benchmark-results.json
            backend/junit*.xml
          retention-days: 30

  integration-tests-backend:
    runs-on: ubuntu-latest
    needs: test-backend
    if: github.event_name == 'push' || github.event_name == 'schedule'
    defaults:
      run:
        working-directory: ./backend

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: portfolio_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest requests

      - name: Start application
        run: |
          python manage.py migrate &
          sleep 10
        env:
          DJANGO_SETTINGS_MODULE: portfolio_management.settings

      - name: Run API integration tests
        run: |
          python -m pytest tests/integration/api/ -v --tb=short -n auto
        env:
          DJANGO_SETTINGS_MODULE: portfolio_management.settings

  performance-regression-check:
    runs-on: ubuntu-latest
    needs: test-backend
    if: github.event_name == 'push' || github.event_name == 'schedule'
    defaults:
      run:
        working-directory: ./backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-benchmark

      - name: Run performance regression tests
        run: |
          python -m pytest -m performance \
            --benchmark-only \
            --benchmark-json=benchmark-results.json \
            --benchmark-min-rounds=3
        env:
          DJANGO_SETTINGS_MODULE: portfolio_management.settings

      - name: Check performance regression
        run: |
          python scripts/check_performance_regressions.py benchmark-results.json || true

  security-scan-backend:
    runs-on: ubuntu-latest
    needs: test-backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: "fs"
          scan-ref: "./backend"
          format: "sarif"
          output: "backend/trivy-results.sarif"

      - name: Upload Trivy scan results
        uses: github/codeql-action/upload-sarif@v2
        with:
          sarif_file: "backend/trivy-results.sarif"
