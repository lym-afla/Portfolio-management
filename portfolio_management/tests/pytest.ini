[tool:pytest]
DJANGO_SETTINGS_MODULE = portfolio_management.settings
python_files = tests.py test_*.py *_tests.py
python_classes = Test*
python_functions = test_*
testpaths = tests
addopts =
    --tb=short
    --strict-markers
    --disable-warnings
    --cov=portfolio_management
    --cov-report=term-missing
    --cov-report=html:htmlcov
    --cov-fail-under=80
    -v
markers =
    unit: Unit tests - fast, isolated tests
    integration: Integration tests - database and API tests
    performance: Performance tests - benchmark and load tests
    regression: Regression tests - production data comparison
    slow: Tests that take more than 1 second to run
    network: Tests that require network access
    fx: Tests related to FX calculations
    nav: Tests related to NAV calculations
    portfolio: Tests related to portfolio management
    bond: Tests related to bond calculations
    api: Tests related to API endpoints
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
