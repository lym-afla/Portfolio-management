name: Performance Benchmarks

on:
  push:
    branches: [ main, develop ]
    pull_request:
    schedule:
      # Run performance tests weekly on Sundays at 3 AM UTC
      - cron: '0 3 * * 0'

jobs:
  benchmark:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: portfolio_benchmark
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest-benchmark memory-profiler

    - name: Set up test database
      run: |
        python manage.py migrate
      env:
        DJANGO_SETTINGS_MODULE: portfolio_management.settings.test

    - name: Run performance benchmarks
      run: |
        pytest tests/advanced/test_performance_suite.py \
          --benchmark-only \
          --benchmark-sort=mean \
          --benchmark-json=benchmark-results.json \
          --benchmark-html=benchmark-report.html \
          --benchmark-columns=min,max,mean,median,rounds,iter,ops

    - name: Profile memory usage
      run: |
        mprof run python scripts/profile_memory_usage.py
        mprof plot --output memory-profile.png mprof_*.dat

    - name: Generate performance report
      run: |
        python scripts/generate_performance_report.py benchmark-results.json performance-report.md

    - name: Check for performance regressions
      run: |
        python scripts/check_performance_regressions.py benchmark-results.json

    - name: Upload benchmark artifacts
      uses: actions/upload-artifact@v3
      with:
        name: performance-reports
        path: |
          benchmark-results.json
          benchmark-report.html
          memory-profile.png
          performance-report.md
        retention-days: 90

    - name: Comment PR with benchmark results
      if: github.event_name == 'pull_request'
      uses: actions/github-script@v6
      with:
        script: |
          const fs = require('fs');
          const benchmarkResults = JSON.parse(fs.readFileSync('benchmark-results.json', 'utf8'));

          // Create benchmark summary
          let summary = '## 📊 Performance Benchmark Results\n\n';
          summary += '| Test | Min (ms) | Mean (ms) | Max (ms) | Ops/sec |\n';
          summary += '|------|----------|-----------|----------|---------|\n';

          for (const [testName, results] of Object.entries(benchmarkResults.benchmarks)) {
            summary += `| ${testName} | ${results.min.toFixed(2)} | ${results.mean.toFixed(2)} | ${results.max.toFixed(2)} | ${results.ops.toFixed(0)} |\n`;
          }

          github.rest.issues.createComment({
            issue_number: context.issue.number,
            owner: context.repo.owner,
            repo: context.repo.repo,
            body: summary
          });

  load-testing:
    runs-on: ubuntu-latest
    needs: benchmark

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install locust

    - name: Start application
      run: |
        python manage.py migrate &
        sleep 10
      env:
        DJANGO_SETTINGS_MODULE: portfolio_management.settings.test

    - name: Run load tests
      run: |
        locust --headless \
          --users 100 \
          --spawn-rate 10 \
          --run-time 60s \
          --host http://localhost:8000 \
          --html load-test-report.html \
          -f tests/load/locustfile.py

    - name: Upload load test report
      uses: actions/upload-artifact@v3
      with:
        name: load-test-report
        path: load-test-report.html
        retention-days: 30

  performance-monitoring:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests prometheus-client

    - name: Run performance monitoring
      run: |
        python scripts/monitor_performance.py \
          --duration 300 \
          --output performance-metrics.json

    - name: Alert on performance issues
      run: |
        python scripts/alert_performance_issues.py performance-metrics.json
